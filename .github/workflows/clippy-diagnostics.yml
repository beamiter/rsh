name: Clippy diagnostics

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust build data
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: clippy

      - name: Capture Clippy output
        run: |
          set +e
          cargo clippy --all-targets --all-features --locked 2>&1 | tee clippy.log
          status=${PIPESTATUS[0]}
          exit "$status"

      - name: Upload Clippy log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clippy-diagnostics-full
          path: clippy.log
          if-no-files-found: error
          retention-days: 1
