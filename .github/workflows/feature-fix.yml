name: Feature fixes

on:
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Fix feature-specific tests and Clippy constant
        shell: python
        run: |
          from pathlib import Path

          phase16 = Path("tests/phase16_tests.rs")
          text = phase16.read_text()
          marker = "#[test]\nfn http_"
          count = text.count(marker)
          if count != 6:
              raise SystemExit(f"expected 6 HTTP tests, found {count}")
          phase16.write_text(text.replace(marker, "#[cfg(feature = \"ai\")]\n#[test]\nfn http_"))

          math_tests = Path("tests/math_into_tests.rs")
          text = math_tests.read_text()
          old = "(v - 1.4142135623730951).abs()"
          new = "(v - std::f64::consts::SQRT_2).abs()"
          if text.count(old) != 1:
              raise SystemExit("expected sqrt(2) assertion was not found exactly once")
          math_tests.write_text(text.replace(old, new))

      - name: Format changes
        run: cargo fmt --all

      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/phase16_tests.rs tests/math_into_tests.rs
          if git diff --cached --quiet; then
            echo "No fixes needed"
            exit 0
          fi
          git commit -m "Fix feature-matrix test coverage"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
