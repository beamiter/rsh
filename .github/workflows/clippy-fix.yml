name: Clippy fixes

on:
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Apply minimal Clippy fixes
        shell: python
        run: |
          from pathlib import Path

          replacements = {
              "src/expand.rs": [
                  (
                      "while *pos < tokens.len() && matches!(tokens.get(*pos), Some(ArithToken::Comma)) {\n        *pos += 1;\n        return eval_arith_expr(tokens, pos, state);\n    }",
                      "if *pos < tokens.len() && matches!(tokens.get(*pos), Some(ArithToken::Comma)) {\n        *pos += 1;\n        return eval_arith_expr(tokens, pos, state);\n    }",
                  ),
              ],
              "src/glob_match.rs": [
                  ("Some(vi - vi)", "Some(0)"),
              ],
              "src/value.rs": [
                  (
                      "assert_eq!(Value::String(\"3.14\".to_string()).as_f64(), Some(3.14));",
                      "assert_eq!(Value::String(\"2.5\".to_string()).as_f64(), Some(2.5));",
                  ),
              ],
          }

          for filename, edits in replacements.items():
              path = Path(filename)
              text = path.read_text()
              for old, new in edits:
                  count = text.count(old)
                  if filename == "src/glob_match.rs":
                      if count != 2:
                          raise SystemExit(f"expected 2 occurrences in {filename}, found {count}")
                      text = text.replace(old, new)
                  else:
                      if count != 1:
                          raise SystemExit(f"expected 1 occurrence in {filename}, found {count}")
                      text = text.replace(old, new)
              path.write_text(text)

      - name: Format changes
        run: cargo fmt --all

      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/expand.rs src/glob_match.rs src/value.rs
          if git diff --cached --quiet; then
            echo "No fixes needed"
            exit 0
          fi
          git commit -m "Fix Clippy-denied code patterns"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
