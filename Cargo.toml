[package]
name = "rsh"
version = "0.1.0"
edition = "2021"

[dependencies]
crossterm = "0.28"
nix = { version = "0.29", features = ["signal", "process", "term", "fs"] }
glob = "0.3"
dirs = "5.0"
regex = "1"
serde_json = "1"
serde = { version = "1", features = ["derive"] }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "bench_core"
harness = false

[profile.release]
opt-level = 3
lto = true
strip = true
